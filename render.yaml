services:
  - type: web
    name: loansense-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && cd backend && python -m ml.train && cd .. && python backend/rag/ingest.py
    preDeployCommand: python scripts/init_db.py
    startCommand: cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: loansense-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.11

  - type: web
    name: loansense-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd frontend && streamlit run app.py --server.address 0.0.0.0 --server.port $PORT
    envVars:
      - key: API_HOSTPORT
        fromService:
          type: web
          name: loansense-api
          property: hostport
      - key: PYTHON_VERSION
        value: 3.12.11

databases:
  - name: loansense-db
    databaseName: loansense
    user: loansense
    plan: free
    postgresMajorVersion: "17"
